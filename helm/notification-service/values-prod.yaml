replicaCount: 2

config:
  service:
    env: production
  log:
    level: info
  queue:
    host: ""   # set via: --set config.queue.host=<rabbitmq-host>

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilization: 70

pdb:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
