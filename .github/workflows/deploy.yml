name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false

env:
  AWS_REGION: eu-west-1

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          TAG=${{ github.event.inputs.image_tag }}
          echo "IMAGE_TAG=${TAG:-${{ github.sha }}}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform apply
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Read Terraform outputs
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint)"             >> $GITHUB_ENV
          echo "ECR_USER=$(terraform output -raw ecr_user_service_url)"         >> $GITHUB_ENV
          echo "ECR_NOTIF=$(terraform output -raw ecr_notification_url)"        >> $GITHUB_ENV
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)"             >> $GITHUB_ENV

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ env.ECR_USER }}

      - name: Build and push user-service
        run: |
          docker build \
            -t ${{ env.ECR_USER }}:${{ env.IMAGE_TAG }} \
            -f services/user-service/docker/Dockerfile \
            services/
          docker push ${{ env.ECR_USER }}:${{ env.IMAGE_TAG }}

      - name: Build and push notification-service
        run: |
          docker build \
            -t ${{ env.ECR_NOTIF }}:${{ env.IMAGE_TAG }} \
            -f services/notification-service/docker/Dockerfile \
            services/
          docker push ${{ env.ECR_NOTIF }}:${{ env.IMAGE_TAG }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy user-service
        run: |
          helm upgrade --install user-service ./helm/user-service \
            -f helm/user-service/values-${{ github.event.inputs.environment }}.yaml \
            --set image.registry=${{ env.ECR_USER }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set config.database.host=${{ env.RDS_ENDPOINT }} \
            --set secrets.databasePassword=${{ secrets.DB_PASSWORD }} \
            --set secrets.queuePassword=${{ secrets.QUEUE_PASSWORD }}

      - name: Deploy notification-service
        run: |
          helm upgrade --install notification-service ./helm/notification-service \
            -f helm/notification-service/values-${{ github.event.inputs.environment }}.yaml \
            --set image.registry=${{ env.ECR_NOTIF }} \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set config.queue.host=${{ secrets.RABBITMQ_HOST }} \
            --set secrets.queuePassword=${{ secrets.QUEUE_PASSWORD }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/user-service-user-service
          kubectl rollout status deployment/notification-service-notification-service
